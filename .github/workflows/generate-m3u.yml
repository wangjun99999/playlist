name: Generate BeeSport M3U

# 触发条件：每天UTC时间0点运行，或手动触发
on:
  schedule:
    - cron: '0 0 * * *'  # 每天运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest  # 使用Ubuntu环境

    steps:
      # 步骤1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：安装Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # 指定Python版本

      # 步骤3：安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：运行脚本生成M3U文件
      - name: Run script to generate M3U
        run: |
          python beesport.py  # 运行脚本，生成beesport.m3u

      # 步骤5：提交并推送生成的M3U文件到仓库
      - name: Commit and push M3U file
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add beesport.m3u
          git commit -m "Auto-update M3U file: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
