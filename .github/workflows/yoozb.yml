name: 生成并更新M3U文件

on:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时运行一次
  push:
    branches: [ main ]     # 推送代码时运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    - name: 运行脚本生成M3U文件
      run: |
        python yoozb.py
        
    - name: 提交更新的M3U文件
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add yoozb.m3u
        git commit -m "自动更新M3U文件: $(date +'%Y-%m-%d %H:%M:%S')" || echo "没有更新需要提交"
        git push
